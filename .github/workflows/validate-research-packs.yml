name: Validate research packs

on:
  pull_request:
    paths:
      - "research-packs/**"
      - "scripts/validate_research_packs.py"
      - ".github/workflows/validate-research-packs.yml"
  push:
    branches:
      - main
    paths:
      - "research-packs/**"
      - "scripts/validate_research_packs.py"
      - ".github/workflows/validate-research-packs.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate research pack format
        run: python3 scripts/validate_research_packs.py
